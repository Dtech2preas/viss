<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Forever - Authentication</title>
    <script src="auth-check.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff7eb9;
            --secondary-color: #7e57c2;
            --accent-color: #ff4d8d;
            --light-color: #fff5f9;
            --dark-color: #3a2846;
            --gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-color);
            color: var(--dark-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 50L0 25L50 0L100 25L50 50Z' fill='%23ff7eb922' /%3E%3C/svg%3E");
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(166, 94, 166, 0.15);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--gradient);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .heart-icon {
            font-size: 40px;
            color: var(--accent-color);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--secondary-color);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--dark-color);
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e6d4f7;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 126, 185, 0.3);
        }

        .btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(126, 87, 194, 0.3);
        }

        #error-message {
            color: #d32f2f;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
            min-height: 24px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="heart-icon">❤</div>
            <h1>Our Secret Space</h1>
            <p class="subtitle">Please answer the questions below to access</p>
        </header>

        <form id="auth-form">
            <div class="form-group">
                <label for="q1">1. Who are you?</label>
                <input type="text" id="q1" required placeholder="Your name...">
            </div>

            <div class="form-group">
                <label for="q2">2. Who is your partner's first name?</label>
                <input type="text" id="q2" required placeholder="Partner's name...">
            </div>

            <div class="form-group">
                <label for="q3">3. What's our combined age?</label>
                <input type="text" id="q3" required placeholder="Combined age...">
            </div>

            <div class="form-group">
                <label for="q4">4. What are Jonas's 2 favourite colours?</label>
                <input type="text" id="q4" required placeholder="Colours...">
            </div>

            <button type="submit" class="btn" id="submit-btn">Unlock</button>
            <div id="error-message"></div>
        </form>
    </div>

    <script>
        const API_URL = 'https://shrill-base-9781.dtechxpreas.workers.dev';

        document.getElementById('auth-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-message');

            const answers = {
                q1: document.getElementById('q1').value,
                q2: document.getElementById('q2').value,
                q3: document.getElementById('q3').value,
                q4: document.getElementById('q4').value
            };

            btn.textContent = 'Checking...';
            btn.disabled = true;
            errorDiv.textContent = '';

            try {
                const response = await fetch(`${API_URL}/api/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(answers)
                });

                const data = await response.json();

                if (data.success && data.token) {
                    localStorage.setItem('together_auth_token', data.token);
                    window.location.href = 'you.html';
                } else {
                    errorDiv.textContent = data.message || 'Incorrect answers. Please try again.';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                console.error(err);
            } finally {
                btn.textContent = 'Unlock';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
